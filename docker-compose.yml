services:
  pacman:
    build: .
    env_file:
      - .env
    environment:
      - PORT=8000
      - DB_PATH=/opt/pacman-data/production.db
      # ⚠️  OBRIGATÓRIO: defina um token seguro em .env
      #    Gere com: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      - RESET_SCORE_TOKEN=${RESET_SCORE_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./pacman-data:/opt/pacman-data
